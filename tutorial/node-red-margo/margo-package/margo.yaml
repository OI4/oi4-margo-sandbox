apiVersion: margo.org/v1-alpha1
kind: ApplicationDescription
metadata:
  id: node-red-stack
  name: Node-RED Stack
  description: Node-RED packaged as a Compose-based Margo application.
  version: 1.0.0
  catalog:
    application:
      tagline: Low-code flow editor for event-driven integrations.
      descriptionFile: ./resources/description.md
      releaseNotes: ./resources/release-notes.md
      licenseFile: ./resources/license.txt
      site: https://nodered.org
      tags: ["node-red", "flows", "iot", "low-code"]
deploymentProfiles:
  - type: compose
    id: node-red-compose
    components:
      - name: node-red
        properties:
          packageLocation: https://raw.githubusercontent.com/OI4/oi4-margo-sandbox/refs/heads/main/tutorial/node-red-margo/compose.yaml
parameters:
  nodeRedPort:
    value: 1880
    targets:
      - pointer: PORTS.1880
        components: ["node-red"]
configuration:
  sections:
    - name: Node-RED Settings
      settings:
        - parameter: nodeRedPort
          name: Node-RED Port
          description: Port exposed by the Node-RED service.
          schema: portRange
  schema:
    - name: portRange
      dataType: integer
      minValue: 1024
      maxValue: 65535
      allowEmpty: false

